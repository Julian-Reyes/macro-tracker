app = 'app-winter-haze-6801'
primary_region = 'sjc'

[build]

[env]
  PORT = '3001'
  NODE_ENV = 'production'
  DATABASE_URL = 'file:/data/macro-tracker.db'
  UPLOAD_DIR = '/data/uploads'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'macro_data'
  destination = '/data'
