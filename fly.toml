# fly.toml app configuration file generated for macro-tracker on 2026-03-24T01:44:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'macro-tracker'
primary_region = 'iad'

[build]

[env]
  PORT = '3001'
  NODE_ENV = 'production'
  DATABASE_URL = 'file:/data/macro-tracker.db'
  UPLOAD_DIR = '/data/uploads'

[mounts]
  source = 'macro_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
